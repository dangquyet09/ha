<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Tạo Link Shopee - Săn Deal Ngon</title>

<link rel="icon" type="image/png" href="/favicon.png">

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #fda085, #f6d365);
}

/* HEADER */
.header {
    text-align: center;
    padding: 30px 10px 10px;
    font-size: 26px;
    font-weight: bold;
    color: #ff4d2d;
}

/* CARD MAIN */
.container {
    max-width: 520px;
    margin: 20px auto;
    background: rgba(255,255,255,0.9);
    backdrop-filter: blur(10px);
    padding: 20px;
    border-radius: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.15);
}

/* INPUT */
.input-box {
    width: 100%;
}

.input-box input {
    width: 100%;
    padding: 14px;
    border-radius: 12px;
    border: none;
    font-size: 14px;
    box-shadow: inset 0 2px 6px rgba(0,0,0,0.1);
    box-sizing: border-box;
}

/* BUTTON */
.btn-main {
    display: block;
    width: 100%;
    margin-top: 15px;
    padding: 16px;
    background: linear-gradient(135deg, #ff4d2d, #ff7a5c);
    color: white;
    border: none;
    border-radius: 14px;
    font-size: 17px;
    font-weight: 600;
    cursor: pointer;
    text-align: center;
    box-shadow: 0 6px 15px rgba(255,77,45,0.4);
    transition: all 0.2s ease;
}

.btn-main:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 20px rgba(255,77,45,0.5);
}

.btn-main:active {
    transform: scale(0.97);
}

/* RESULT CARD */
.card {
    background: white;
    border-radius: 14px;
    padding: 15px;
    margin-top: 12px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

.card-title {
    color: #16a34a;
    font-weight: bold;
}

.link {
    font-size: 12px;
    word-break: break-all;
    margin: 10px 0;
    color: #555;
}

.copy-btn {
    background: #ff4d2d;
    color: white;
    border: none;
    padding: 6px 12px;
    border-radius: 6px;
    cursor: pointer;
}

/* ACTION */
.actions {
    display: flex;
    gap: 10px;
    margin-top: 15px;
}

.actions button {
    flex: 1;
    padding: 13px;
    border: none;
    border-radius: 12px;
    color: white;
    font-weight: bold;
    cursor: pointer;
}

.buy {
    background: linear-gradient(90deg,#28c76f,#48da89);
}

.share {
    background: linear-gradient(90deg,#3b5998,#4a6fd6);
}

/* ================== ADD NEW ================== */

/* LOADING */
.btn-loading {
    opacity: 0.7;
    pointer-events: none;
    position: relative;
}

.btn-loading::after {
    content: "";
    width: 18px;
    height: 18px;
    border: 3px solid white;
    border-top-color: transparent;
    border-radius: 50%;
    position: absolute;
    right: 15px;
    top: 50%;
    transform: translateY(-50%);
    animation: spin 0.8s linear infinite;
}

@keyframes spin {
    to { transform: translateY(-50%) rotate(360deg); }
}

/* TOAST */
.toast {
    position: fixed;
    top: 20px;
    right: 20px;
    background: white;
    padding: 15px 20px;
    border-radius: 12px;
    box-shadow: 0 8px 25px rgba(0,0,0,0.15);
    display: flex;
    align-items: center;
    gap: 10px;
    transform: translateX(120%);
    transition: 0.4s;
    z-index: 999;
}

.toast.show {
    transform: translateX(0);
}

/* LIGHT EFFECT */
.btn-main,
.actions button,
.copy-btn {
    position: relative;
    overflow: hidden;
}

.btn-main::before,
.actions button::before,
.copy-btn::before {
    content: "";
    position: absolute;
    top: 0;
    left: -75%;
    width: 50%;
    height: 100%;
    background: linear-gradient(
        120deg,
        rgba(255,255,255,0) 0%,
        rgba(255,255,255,0.6) 50%,
        rgba(255,255,255,0) 100%
    );
    transform: skewX(-20deg);
}

.btn-main:hover::before,
.actions button:hover::before,
.copy-btn:hover::before {
    animation: shine 0.8s;
}

@keyframes shine {
    100% { left: 125%; }
}

</style>
</head>

<body>

<div class="header">🔗 Tạo Link Shopee</div>

<div class="container">

    <div class="input-box">
        <input type="text" id="linkInput" placeholder="Dán link Shopee vào đây...">
    </div>

    <button class="btn-main" onclick="taoLink()">Tạo Link Ngay</button>

    <div id="resultBox"></div>

    <div class="actions">
        <button class="buy" onclick="openMain()">🛒 Mua Ngay</button>
        <button class="share" onclick="copyMain()">📘 Chia sẻ</button>
    </div>

</div>

<!-- TOAST -->
<div id="toast" class="toast">
    ✔ <span id="toastText">Thông báo</span>
</div>

<script>
let mainLink = "";

function buildAff(link, sub) {
    return "https://s.shopee.vn/an_redir?origin_link="
        + encodeURIComponent(link)
        + "&share_channel_code=4&affiliate_id=17310760448&sub_id=" + sub;
}

function taoLink() {
    let btn = document.querySelector(".btn-main");
    let link = document.getElementById("linkInput").value.trim();

    if (!link.includes("shopee.vn")) {
        showToast("Link không hợp lệ!");
        return;
    }

    btn.classList.add("btn-loading");
    btn.innerText = "Đang xử lý...";

    setTimeout(() => {

        let aff1 = buildAff(link, "dealhot_22");
        let aff2 = buildAff(link, "dealhot_20");

        mainLink = aff1;

        document.getElementById("resultBox").innerHTML = `
            <div class="card">
                <div class="card-title">✔ Mã 22% tối đa 300K</div>
                <div class="link">${aff1}</div>
                <button class="copy-btn" onclick="copy('${aff1}')">Copy</button>
            </div>

            <div class="card">
                <div class="card-title">✔ Mã 20% tối đa 250K</div>
                <div class="link">${aff2}</div>
                <button class="copy-btn" onclick="copy('${aff2}')">Copy</button>
            </div>
        `;

        btn.classList.remove("btn-loading");
        btn.innerText = "Tạo Link Ngay";

        showToast("Tạo 2 link thành công!");

    }, 1000);
}

function copy(text) {
    navigator.clipboard.writeText(text);
    showToast("Đã copy!");
}

function copyMain() {
    if (mainLink) {
        navigator.clipboard.writeText(mainLink);
        showToast("Đã copy!");
    }
}

function openMain() {
    if (!mainLink) {
        showToast("Hãy tạo link trước!");
        return;
    }
    window.open(mainLink, "_blank");
}

function showToast(message) {
    let toast = document.getElementById("toast");
    let text = document.getElementById("toastText");

    text.innerText = message;

    toast.classList.add("show");

    setTimeout(() => {
        toast.classList.remove("show");
    }, 2500);
}
</script>

</body>
</html>
