<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tạo Link Shopee</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #e9a88f;
}

.header {
    text-align: center;
    padding: 30px;
    font-size: 24px;
    font-weight: bold;
    color: #ff4d2d;
}

.container {
    max-width: 520px;
    margin: auto;
    background: #eee;
    padding: 20px;
    border-radius: 16px;
}

.input-box input {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: none;
}

.btn-main {
    width: 100%;
    margin-top: 15px;
    padding: 14px;
    background: #ff4d2d;
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 16px;
    cursor: pointer;
}

.result {
    margin-top: 15px;
}

.card {
    background: #fff;
    border-radius: 12px;
    padding: 15px;
    border: 2px solid #ff4d2d;
    margin-bottom: 10px;
}

.card-title {
    color: green;
    font-weight: bold;
    margin-bottom: 8px;
}

.link {
    font-size: 12px;
    word-break: break-all;
    margin-bottom: 10px;
}

.copy-btn {
    background: #ff4d2d;
    color: white;
    border: none;
    padding: 6px 12px;
    border-radius: 6px;
    cursor: pointer;
}

.actions {
    display: flex;
    gap: 10px;
    margin-top: 15px;
}

.actions button {
    flex: 1;
    padding: 12px;
    border: none;
    border-radius: 10px;
    color: white;
    cursor: pointer;
}

.buy { background: #28c76f; }
.share { background: #3b5998; }

.guide {
    background: #ddd;
    padding: 15px;
    border-radius: 10px;
    margin-top: 20px;
}
</style>
</head>

<body>

<div class="header">🔗 Tạo Link Shopee</div>

<div class="container">

    <div class="input-box">
        <input type="text" id="linkInput" placeholder="Dán link Shopee vào đây...">
    </div>

    <button class="btn-main" onclick="taoLink()">Tạo Link Ngay</button>

    <div class="result" id="resultBox"></div>

    <div class="actions">
        <button class="buy" onclick="openMain()">Mua Ngay</button>
        <button class="share" onclick="copyMain()">Chia sẻ</button>
    </div>

    <div class="guide">
        <b>Hướng dẫn:</b><br><br>
        1. Dán link Shopee<br>
        2. Bấm "Tạo Link"<br>
        3. Copy và đăng Facebook
    </div>

</div>

<script>

let mainLink = "";

function buildAff(link, sub) {
    return "https://s.shopee.vn/an_redir?origin_link="
        + encodeURIComponent(link)
        + "&share_channel_code=4&affiliate_id=17310760448&sub_id=" + sub;
}

function taoLink() {
    let link = document.getElementById("linkInput").value.trim();

    if (!link.includes("shopee.vn")) {
        alert("Link không hợp lệ!");
        return;
    }

    // 2 mã giả lập (sau có thể random / API thật)
    let aff1 = buildAff(link, "dealhot_22");
    let aff2 = buildAff(link, "dealhot_20");

    mainLink = aff1;

    document.getElementById("resultBox").innerHTML = `
        <div class="card">
            <div class="card-title">✔ Mã 22% tối đa 300K/50K</div>
            <div class="link">${aff1}</div>
            <button class="copy-btn" onclick="copy('${aff1}')">Copy</button>
        </div>

        <div class="card">
            <div class="card-title">✔ Mã 20% tối đa 250K/50K</div>
            <div class="link">${aff2}</div>
            <button class="copy-btn" onclick="copy('${aff2}')">Copy</button>
        </div>
    `;
}

function copy(text) {
    navigator.clipboard.writeText(text);
    alert("Đã copy!");
}

function openMain() {
    if (mainLink) window.open(mainLink, "_blank");
}

function copyMain() {
    if (mainLink) {
        navigator.clipboard.writeText(mainLink);
        alert("Đã copy link chính!");
    }
}

</script>

</body>
</html>
